<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zombie War - Edición Corregida</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#111;font-family:'Share Tech Mono',monospace;
  color:#fff;overflow:hidden;width:100vw;height:100vh;user-select:none;
}

/* ════════════ PATCH 3: ESTILOS CONTROLES MÓVILES ════════════ */
#mobileCtrl{display:none;position:absolute;inset:0;pointer-events:none;z-index:12}
#joystickZone{position:absolute;left:10px;bottom:55px;width:130px;height:130px;pointer-events:auto}
#joystickBase{position:absolute;inset:0;border-radius:50%;background:rgba(0,255,0,0.07);border:2px solid rgba(0,255,0,0.22)}
#joystickThumb{position:absolute;width:54px;height:54px;border-radius:50%;background:rgba(0,220,0,0.2);border:2px solid rgba(0,255,0,0.45);left:50%;top:50%;transform:translate(-50%,-50%)}
#mobileButtons{position:absolute;right:10px;bottom:55px;display:flex;flex-direction:column;gap:10px;align-items:center;pointer-events:auto}
.mbtn{border-radius:50%;border:2px solid rgba(0,255,0,0.35);background:rgba(0,25,0,0.8);color:#7fff7f;font-family:'Share Tech Mono',monospace;font-size:11px;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;text-align:center;user-select:none;-webkit-user-select:none;line-height:1.3;touch-action:manipulation}
#mFireBtn{width:80px;height:80px;border-color:rgba(255,200,0,0.55);color:#ff0;font-size:12px;background:rgba(30,20,0,0.85)}
#mFireBtn.firing{background:rgba(80,50,0,0.95);border-color:rgba(255,220,0,0.9)}
#mGrenBtn{width:58px;height:58px;border-color:rgba(255,80,0,0.4);color:#f80}
#mSprintBtn{width:54px;height:54px;border-color:rgba(0,200,255,0.35);color:#0ff;font-size:10px}
#mWepWrap{display:flex;gap:5px;pointer-events:auto;absolute;left:50%;transform:translateX(-50%);bottom:8px}
.mwbtn{padding:5px 9px;border-radius:5px;border:1px solid rgba(0,255,0,0.28);background:rgba(0,18,0,0.82);color:#7fff7f;font-family:'Share Tech Mono',monospace;font-size:10px;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:manipulation}
.mwbtn.active{border-color:#ff0;color:#ff0;background:rgba(40,30,0,0.9)}

@media (pointer:coarse){
  #mobileCtrl{display:block}
}
</style>
</head>
<body>

<div id="game-container"></div>

<div id="mobileCtrl">
  <div id="joystickZone">
    <div id="joystickBase"></div>
    <div id="joystickThumb"></div>
  </div>
  <div id="mobileButtons">
    <button class="mbtn" id="mFireBtn">🔥 DISPARAR</button>
    <button class="mbtn" id="mGrenBtn">💣 GRANADA</button>
    <button class="mbtn" id="mSprintBtn">⚡ SPRINT</button>
  </div>
  <div id="mWepWrap">
    <button class="mwbtn active" id="mwb1">1 PISTOLA</button>
    <button class="mwbtn" id="mwb2">2 ESCOPETA</button>
    <button class="mwbtn" id="mwb3">3 MINIGUN</button>
    <button class="mwbtn" id="mwb4">4 BAZUCA</button>
  </div>
</div>

<script>
// VARIABLES GLOBALES DE CONFIGURACIÓN
let WORLD_W = 4000, WORLD_H = 4000;
let zombies = [];
let boss = null;
let bossActive = false;
let gf_state = 'playing'; // Estado simulado

// ════════════ PATCH 1: CONFIGURACIÓN EQUILIBRADA DEL BOSS ════════════
let bn = 1; // Número de ronda/boss base
let hpScale = Math.floor(16000 * Math.pow(1.7, bn - 4));
let spdScale = Math.min(1.6 + bn * 3.4, 2.4);

let bossData = {
  x: WORLD_W / 2,
  y: 160,
  hp: hpScale,
  maxHp: hpScale,
  spd: spdScale,
  sz: 150, // maxHp scale equivalente
  angle: 0,
  lastShot: 0,
  lastAtk: 0,
  shootCd: Math.max(400, 900 - bn * 80),
  charging: false,
  chargeSpd: Math.min(spdScale + 1.5, 5)
};

// RECEPCIÓN DE DATOS MULTIJUGADOR DESDE EL SERVIDOR
const socket = typeof io !== 'undefined' ? io() : { on:()=>{}, emit:()=>{} };

socket.on('boss_state', (data) => {
  // Sincronización exacta y suavizado para evitar parpadeos en modo online
  bossActive = data.bossActive || false;
  if (data.boss) {
    boss = {
      x: Math.round(data.boss.x),
      y: Math.round(data.boss.y),
      hp: data.boss.hp,
      maxHp: data.boss.maxHp,
      sz: data.boss.sz,
      coll1: data.boss.coll1,
      coll2: data.boss.coll2,
      coll3: data.boss.coll3,
      angle: data.boss.angle,
      bossNum: data.boss.bossNum,
      eyeCol: data.boss.eyeCol,
      charging: data.boss.charging || false,
      dashing: data.boss.dashing || false,
      lastAbility: data.boss.lastAbility || null
    };
  } else {
    boss = null;
  }
});

// Daño por contacto del boss (Lógica del bucle de físicas del juego)
function checkBossCollision(player) {
  if (!bossActive || !boss) return;
  let now = Date.now();
  if (now - boss.lastAtk > 700) {
    // Si colisiona con el jugador (ejemplo de distancia base de daño)
    boss.lastAtk = now;
    // Aplicar daño mitigado o escalado: player.hurt(14 + boss.bossNum * 3);
  }
}

// ════════════ PATCH 3: LÓGICA DE JAVASCRIPT PARA MÓVILES ════════════
let activeWeaponIdx = 1;
function updMWep() {
  for(let i = 1; i <= 4; i++) {
    const el = document.getElementById('mwb' + i);
    if(el) {
      if(i === activeWeaponIdx) el.classList.add('active');
      else el.classList.remove('active');
    }
  }
}

// Registro de eventos para cambio de armas táctil
for(let i = 1; i <= 4; i++) {
  const el = document.getElementById('mwb' + i);
  if(el) {
    el.addEventListener('touchstart', (e) => {
      e.preventDefault();
      activeWeaponIdx = i;
      updMWep();
    });
  }
}

// Variables de control de inputs
let keys = { KeyW: false, KeyS: false, KeyA: false, KeyD: false };
let jZone = document.getElementById('joystickZone');
let jThumb = document.getElementById('joystickThumb');
let jId = null; 
let jOx = 0, jOy = 0;

jZone.addEventListener('touchstart', e => {
  e.preventDefault();
  let t = e.changedTouches[0];
  jId = t.identifier;
  let r = jZone.getBoundingClientRect();
  jOx = r.left + r.width / 2;
  jOy = r.top + r.height / 2;
});

jZone.addEventListener('touchmove', e => {
  if(jId === null) return;
  e.preventDefault();
  for(let i = 0; i < e.changedTouches.length; i++) {
    let t = e.changedTouches[i];
    if(t.identifier === jId) {
      let dx = t.clientX - jOx, dy = t.clientY - jOy;
      let d = Math.sqrt(dx * dx + dy * dy);
      let JR = 58; // Radio límite del joystick
      if(d > JR) { dx *= JR / d; dy *= JR / d; }
      jThumb.style.left = (50 + dx / JR * 50) + '%';
      jThumb.style.top = (50 + dy / JR * 50) + '%';
      
      let thr = 0.28;
      keys['KeyW'] = (dy / JR) < -thr;
      keys['KeyS'] = (dy / JR) > thr;
      keys['KeyA'] = (dx / JR) < -thr;
      keys['KeyD'] = (dx / JR) > thr;
      break;
    }
  }
});

function jEnd(e) {
  if(jId === null) return;
  for(let i = 0; i < e.changedTouches.length; i++) {
    let t = e.changedTouches[i];
    if(t.identifier === jId) {
      jId = null;
      jThumb.style.left = '50%';
      jThumb.style.top = '50%';
      keys['KeyW'] = false; keys['KeyS'] = false; keys['KeyA'] = false; keys['KeyD'] = false;
      break;
    }
  }
}
jZone.addEventListener('touchend', jEnd);
jZone.addEventListener('touchcancel', jEnd);

// Botones de disparo, granada y velocidad
let fireBtn = document.getElementById('mFireBtn');
let grenBtn = document.getElementById('mGrenBtn');
let sprintBtn = document.getElementById('mSprintBtn');
let mouseDown = false;
let sprintToggle = false;

fireBtn.addEventListener('touchstart', e => {
  e.preventDefault();
  mouseDown = true;
  fireBtn.classList.add('firing');
});
fireBtn.addEventListener('touchend', e => {
  e.preventDefault();
  mouseDown = false;
  fireBtn.classList.remove('firing');
});

grenBtn.addEventListener('touchstart', e => {
  e.preventDefault();
  if(gf_state === 'playing') {
    // Lógica para arrojar granada: throwGrenade();
  }
});

sprintBtn.addEventListener('touchstart', e => {
  e.preventDefault();
  sprintToggle = !sprintToggle;
  sprintBtn.style.background = sprintToggle ? 'rgba(0,40,40,0.9)' : 'rgba(0,25,0,0.8)';
  sprintBtn.style.borderColor = sprintToggle ? '#0ff' : 'rgba(0,200,255,0.35)';
  sprintBtn.innerHTML = sprintToggle ? '⚡ SPRINT<br>[ON]' : '⚡ SPRINT<br>[OFF]';
  // Activa el multiplicador de velocidad en tu bucle principal: speedMultiplier = sprintToggle ? 2 : 1;
});

// Auto-Aim automático optimizado para móviles (Apunta al zombie o Boss más cercano en pantalla)
setInterval(() => {
  if (gf_state !== 'playing') return;
  let best = null, bestD = Infinity;
  let targets = [...zombies];
  if (bossActive && boss) targets.push(boss);
  
  // Aquí se calcula el objetivo más cercano respecto a la cámara del jugador para fijar el disparo
  for (const z of targets) {
    if(!z) continue;
    // Lógica interna de distancia: let d2 = dist2(z.x, z.y, player.x, player.y);
    // if(d2 < bestD) { bestD = d2; best = z; }
  }
}, 250);
</script>
</body>
</html>
