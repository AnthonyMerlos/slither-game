<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slither.io</title>
<script src="/socket.io/socket.io.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#1a1a2e;font-family:'Nunito',sans-serif;
  color:#e2e8f0;overflow:hidden;width:100vw;height:100vh;user-select:none;
}

/* ════════════ MENU ════════════ */
#menu{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 40%,#0f3460 0%,#080818 70%);
  z-index:100;
}
.logo{
  font-size:clamp(3rem,8vw,6rem);font-weight:900;
  letter-spacing:-2px;margin-bottom:4px;
  text-shadow:0 0 40px rgba(74,222,128,.5);
}
.logo .g{color:#4ade80}.logo .d{color:#a855f7}.logo .io{color:#a855f7}

.snake-deco{margin-bottom:26px;animation:bob 2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}

#nickname{
  background:rgba(255,255,255,.08);border:2px solid rgba(74,222,128,.3);
  border-radius:30px;padding:14px 28px;color:#fff;
  font-size:1.2rem;font-family:'Nunito',sans-serif;
  width:300px;text-align:center;outline:none;
  transition:border-color .3s;margin-bottom:22px;
}
#nickname:focus{border-color:#4ade80}
#nickname::placeholder{color:rgba(255,255,255,.3)}

.mode-wrap{display:flex;gap:16px;margin-bottom:26px}
.mode-btn{
  display:flex;flex-direction:column;align-items:center;
  padding:18px 32px;border:none;border-radius:16px;
  font-family:'Nunito',sans-serif;cursor:pointer;
  transition:transform .15s,box-shadow .2s;
  min-width:140px;
}
.mode-btn .icon{font-size:2rem;margin-bottom:6px}
.mode-btn .label{font-size:1.1rem;font-weight:900}
.mode-btn .sub{font-size:.75rem;opacity:.75;margin-top:2px}
.mode-btn:hover{transform:translateY(-4px)}
.mode-btn:active{transform:scale(.96)}

#btn-bots{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:#fff;box-shadow:0 0 22px rgba(34,197,94,.4);
}
#btn-online{
  background:linear-gradient(135deg,#a855f7,#6d28d9);
  color:#fff;box-shadow:0 0 22px rgba(168,85,247,.4);
}

.skin-label{font-size:.85rem;opacity:.55;margin-bottom:8px}
.skin-row{display:flex;gap:10px}
.skin-btn{
  width:40px;height:40px;border-radius:50%;cursor:pointer;
  border:3px solid transparent;transition:border-color .2s,transform .2s;
}
.skin-btn:hover,.skin-btn.active{border-color:#fff;transform:scale(1.18)}

#online-status{
  margin-top:16px;font-size:.85rem;
  color:rgba(255,255,255,.4);min-height:20px;
}
#online-status.connected{color:#4ade80}
#online-status.connecting{color:#facc15;animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ════════════ CANVAS ════════════ */
#gameCanvas{position:fixed;inset:0;display:none;cursor:none}
#minimap{
  position:fixed;bottom:10px;right:10px;
  width:120px;height:120px;border-radius:8px;
  border:2px solid rgba(255,255,255,.2);display:none;
}

/* ════════════ HUD ════════════ */
#hud{position:fixed;inset:0;pointer-events:none;display:none;z-index:10}
#score-box{
  position:absolute;bottom:14px;left:14px;
  font-size:1rem;color:rgba(255,255,255,.85);
  text-shadow:1px 1px 4px #000;line-height:1.6;
}
#mode-badge{
  position:absolute;top:10px;left:10px;
  padding:4px 12px;border-radius:20px;font-size:.8rem;font-weight:700;
}
#mode-badge.bots{background:rgba(34,197,94,.25);color:#4ade80;border:1px solid rgba(34,197,94,.4)}
#mode-badge.online{background:rgba(168,85,247,.25);color:#c084fc;border:1px solid rgba(168,85,247,.4)}

#leaderboard{
  position:absolute;top:10px;right:10px;
  background:rgba(0,0,0,.5);border-radius:10px;
  padding:10px 14px;min-width:215px;font-size:.85rem;
  backdrop-filter:blur(4px);
}
#leaderboard h3{text-align:center;font-size:1rem;margin-bottom:8px;color:#fff;letter-spacing:1px}
.lb-row{display:flex;gap:6px;margin-bottom:4px;align-items:center}
.lb-rank{color:#a78bfa;font-weight:700;width:26px}
.lb-name{flex:1;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-score{color:#facc15;font-weight:700}
.lb-row.me .lb-name, .lb-row.me .lb-score{color:#4ade80;font-weight:900}

#boost-tip{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.35);font-size:.8rem}

/* ════════════ DEATH ════════════ */
#death{
  position:fixed;inset:0;background:rgba(0,0,0,.78);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;z-index:200;
}
#death h2{font-size:3.2rem;font-weight:900;color:#f87171;margin-bottom:10px;animation:shake .35s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-12px)}75%{transform:translateX(12px)}}
#death .stats{font-size:1.2rem;color:#e2e8f0;margin-bottom:30px;text-align:center}
.death-btns{display:flex;gap:14px}
.death-btn{padding:14px 34px;border:none;border-radius:30px;font-family:'Nunito',sans-serif;font-size:1.1rem;font-weight:900;cursor:pointer;transition:transform .15s}
#btn-respawn{background:linear-gradient(135deg,#4ade80,#22c55e);color:#000;box-shadow:0 0 22px rgba(74,222,128,.5)}
#btn-menu{background:rgba(255,255,255,.1);color:#fff;border:2px solid rgba(255,255,255,.2)}
</style>
</head>
<body>

<div id="menu">
  <div class="logo"><span class="g">slither</span><span class="d">.</span><span class="io">io</span></div>
  <svg class="snake-deco" width="90" height="52" viewBox="0 0 90 52">
    <path d="M4 40 Q22 10 40 30 Q58 50 76 18" fill="none" stroke="#4ade80" stroke-width="11" stroke-linecap="round"/>
    <circle cx="76" cy="18" r="8" fill="#4ade80"/>
    <circle cx="73" cy="14.5" r="3" fill="#1a1a2e"/><circle cx="79" cy="14.5" r="3" fill="#1a1a2e"/>
  </svg>

  <input id="nickname" type="text" placeholder="Tu apodo" maxlength="16" autocomplete="off"/>

  <div class="mode-wrap">
    <button class="mode-btn" id="btn-bots"><span class="icon">🤖</span><span class="label">Bots</span><span class="sub">Jugar solo</span></button>
    <button class="mode-btn" id="btn-online"><span class="icon">🌐</span><span class="label">Online</span><span class="sub">Con amigos</span></button>
  </div>

  <div class="skin-label">Elige tu color:</div>
  <div class="skin-row" id="skin-picker"></div>
  <div id="online-status">🌐 Conectado al servidor</div>
</div>

<canvas id="gameCanvas"></canvas>
<canvas id="minimap"></canvas>

<div id="hud">
  <div id="mode-badge"></div>
  <div id="score-box">
    <div>Longitud: <span id="len-val">10</span></div>
    <div>Rango: <span id="rank-val">-</span> / <span id="total-val">-</span></div>
  </div>
  <div id="leaderboard"><h3>Leaderboard</h3><div id="lb-list"></div></div>
  <div id="boost-tip">Clic izquierdo / Espacio = Boost ⚡</div>
</div>

<div id="death">
  <h2>💀 ¡Eliminado!</h2>
  <div class="stats" id="death-stats"></div>
  <div class="death-btns">
    <button class="death-btn" id="btn-respawn">▶ Jugar de nuevo</button>
    <button class="death-btn" id="btn-menu">🏠 Menú</button>
  </div>
</div>

<script>
const WORLD_W = 4000, WORLD_H = 4000;
const FOOD_COUNT = 700, BOT_COUNT = 19;
const SNAKE_SPEED = 2.8, BOOST_SPEED = 5.2, TURN_SPEED = 0.07;
const SEGMENT_GAP = 8, BASE_RADIUS = 7;

const SKIN_COLORS = [
  { head:'#4ade80', body:'#22c55e' }, { head:'#a855f7', body:'#7c3aed' },
  { head:'#f97316', body:'#ea580c' }, { head:'#06b6d4', body:'#0891b2' },
  { head:'#f43f5e', body:'#e11d48' }, { head:'#facc15', body:'#eab308' },
  { head:'#fb923c', body:'#f97316' }, { head:'#38bdf8', body:'#0ea5e9' }
];

const BOT_NAMES = ['Risa Kitty','Star','[DVL] Hosky','NightBot','xSnake','ZeroX','BlazeFire','ShadowByte','Nexus','VenomX'];

const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
const mmCvs = document.getElementById('minimap'), mmCtx = mmCvs.getContext('2d');
let W, H, gameMode = null, gameActive = false, selectedSkin = 0, mouseX = 0, mouseY = 0, boosting = false, animId = null;

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; mmCvs.width = mmCvs.height = 120; }
resize(); window.addEventListener('resize', resize);

const socket = io({ autoConnect: true });
const online = { myId: null, snakes: {}, foods: [], cam: { x: 0, y: 0 } };

socket.on('init', (data) => {
  online.myId = data.id; online.snakes = data.snakes; online.foods = data.foods;
  const me = online.snakes[online.myId];
  if (me) { online.cam.x = me.segs[0].x - W/2; online.cam.y = me.segs[0].y - H/2; }
  showGame('online');
});

socket.on('state', (data) => {
  if (gameMode !== 'online') return;
  for (const [id, s] of Object.entries(data.snakes)) online.snakes[id] = s;
  if (data.eatenFoodIds?.length) {
    const eaten = new Set(data.eatenFoodIds);
    online.foods = online.foods.filter(f => !eaten.has(f.id));
  }
  updateLB(data.lb, online.myId, Object.keys(online.snakes).length);
  const me = online.snakes[online.myId];
  if (me) document.getElementById('len-val').textContent = me.segs?.length || '-';
});

function dist2(ax, ay, bx, by) { const dx = ax-bx, dy = ay-by; return dx*dx+dy*dy; }
function snakeRadius(score) { return BASE_RADIUS + Math.min(score/150, 12); }
function isInView(x, y, padding = 100) {
  const c = cam();
  return (x >= c.x - padding && x <= c.x + W + padding && y >= c.y - padding && y <= c.y + H + padding);
}

// ── BOTS MODE ──
const bots = { foods: [], snakes: [], player: null, cam: { x: 0, y: 0 } };

function spawnBotFood(n=1) {
  for (let i=0; i<n; i++) {
    const hue = Math.random()*360;
    bots.foods.push({
      x: Math.random()*WORLD_W, y: Math.random()*WORLD_H,
      r: Math.random() > 0.8 ? 8 : 4, color:`hsl(${hue},100%,60%)`,
      value: 10, pulse: Math.random()*Math.PI*2
    });
  }
}

function createBotSnake(x, y, skin, name, isPlayer) {
  const segs = [];
  for (let i=0; i<10; i++) segs.push({x: x-i*SEGMENT_GAP, y});
  return { segs, name, skin, isPlayer, angle: Math.random()*Math.PI*2, alive: true, score: 0, boost: false, ai: isPlayer ? null : { turnTimer: 0 } };
}

function initBots() {
  bots.foods = []; bots.snakes = []; spawnBotFood(FOOD_COUNT);
  const px = WORLD_W/2, py = WORLD_H/2;
  bots.player = createBotSnake(px, py, SKIN_COLORS[selectedSkin], document.getElementById('nickname').value || 'Jugador', true);
  bots.snakes.push(bots.player);
  for (let i=0; i<BOT_COUNT; i++) bots.snakes.push(createBotSnake(Math.random()*WORLD_W, Math.random()*WORLD_H, SKIN_COLORS[i%8], BOT_NAMES[i%10], false));
}

function updateBots(dt) {
  // Lógica de movimiento y colisión local para bots
  bots.snakes.forEach(s => {
    if (!s.alive) return;
    if (s.isPlayer) {
      let targetAngle = Math.atan2(mouseY-H/2, mouseX-W/2);
      let d = targetAngle - s.angle;
      while(d > Math.PI) d -= Math.PI*2; while(d < -Math.PI) d += Math.PI*2;
      s.angle += Math.sign(d) * Math.min(Math.abs(d), TURN_SPEED*dt);
      s.boost = boosting;
    }
    const speed = (s.boost && s.score > 5) ? BOOST_SPEED : SNAKE_SPEED;
    const head = s.segs[0];
    s.segs.unshift({ x: head.x + Math.cos(s.angle)*speed*dt, y: head.y + Math.sin(s.angle)*speed*dt });
    if (s.segs.length > 10 + s.score/5) s.segs.pop();
    
    // Comer
    bots.foods.forEach((f, idx) => {
      if (dist2(s.segs[0].x, s.segs[0].y, f.x, f.y) < 400) { s.score++; bots.foods.splice(idx, 1); spawnBotFood(1); }
    });
  });
  const pHead = bots.player.segs[0];
  bots.cam.x += (pHead.x - W/2 - bots.cam.x) * 0.1;
  bots.cam.y += (pHead.y - H/2 - bots.cam.y) * 0.1;
}

// ── DRAWING ──
function drawFoodArr(foodArr) {
  const t = Date.now()/1000;
  const me = online.snakes[online.myId];
  for (let i = foodArr.length - 1; i >= 0; i--) {
    const f = foodArr[i];
    if (!isInView(f.x, f.y, 50)) continue;
    const pulse = 1 + Math.sin(t * 4 + f.x) * 0.1;
    ctx.beginPath(); ctx.arc(f.x, f.y, (f.r || 5) * pulse, 0, Math.PI*2);
    ctx.fillStyle = f.color; ctx.fill();

    // Colisión Online Local (Crecimiento fluido)
    if (gameMode === 'online' && me?.alive) {
      if (dist2(me.segs[0].x, me.segs[0].y, f.x, f.y) < 400) {
        socket.emit('eat_food', { foodId: f.id });
        foodArr.splice(i, 1);
      }
    }
  }
}

function drawSnakeObj(s, isMe) {
  if (!s.segs || s.segs.length < 2 || !isInView(s.segs[0].x, s.segs[0].y, 200)) return;
  const r = snakeRadius(s.score || 0);
  ctx.lineWidth = r*2; ctx.lineCap = 'round'; ctx.strokeStyle = s.skin.body;
  ctx.beginPath();
  s.segs.forEach((seg, i) => { i === 0 ? ctx.moveTo(seg.x, seg.y) : ctx.lineTo(seg.x, seg.y); });
  ctx.stroke();
  ctx.fillStyle = s.skin.head; ctx.beginPath(); ctx.arc(s.segs[0].x, s.segs[0].y, r*1.2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = isMe ? '#4ade80' : '#fff'; ctx.font = 'bold 14px Nunito'; ctx.textAlign = 'center';
  ctx.fillText(s.name, s.segs[0].x, s.segs[0].y - r - 10);
}

function cam() { return gameMode === 'bots' ? bots.cam : online.cam; }

function frame(ts) {
  const dt = 1; ctx.clearRect(0,0,W,H);
  const c = cam(); ctx.save(); ctx.translate(-c.x, -c.y);
  
  if (gameMode === 'bots') {
    updateBots(dt); drawFoodArr(bots.foods);
    bots.snakes.forEach(s => drawSnakeObj(s, s.isPlayer));
  } else {
    const me = online.snakes[online.myId];
    if (me) { online.cam.x += (me.segs[0].x - W/2 - online.cam.x)*0.1; online.cam.y += (me.segs[0].y - H/2 - online.cam.y)*0.1; }
    drawFoodArr(online.foods);
    Object.values(online.snakes).forEach(s => drawSnakeObj(s, s.id === online.myId));
  }
  ctx.restore();
  if (gameActive) requestAnimationFrame(frame);
}

function showGame(mode) {
  gameMode = mode; gameActive = true;
  document.getElementById('menu').style.display = 'none';
  canvas.style.display = 'block'; document.getElementById('hud').style.display = 'block';
  requestAnimationFrame(frame);
}

document.getElementById('btn-bots').addEventListener('click', () => { initBots(); showGame('bots'); });
document.getElementById('btn-online').addEventListener('click', () => {
  socket.emit('join', { name: document.getElementById('nickname').value || 'Jugador', skinIdx: selectedSkin });
});

// Input
canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
window.addEventListener('mousedown', () => boosting = true); window.addEventListener('mouseup', () => boosting = false);

// Skin Picker
SKIN_COLORS.forEach((s, i) => {
  const b = document.createElement('div'); b.className = 'skin-btn';
  b.style.background = s.head; b.onclick = () => { selectedSkin = i; document.querySelectorAll('.skin-btn').forEach(x => x.style.border = 'none'); b.style.border = '2px solid white'; };
  document.getElementById('skin-picker').appendChild(b);
});
</script>
</body>
</html>
