<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slither.io - Multiplayer Real</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0c0c1e; font-family: 'Nunito', sans-serif; overflow: hidden; color: white; }
        #menu { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a3a 0%, #050510 100%); z-index: 100; }
        .logo { font-size: 4rem; font-weight: 900; margin-bottom: 20px; text-shadow: 0 0 20px #4ade80; }
        input { padding: 12px 20px; border-radius: 25px; border: 2px solid #4ade80; background: rgba(255,255,255,0.1); color: white; margin-bottom: 20px; text-align: center; outline: none; }
        .btns { display: flex; gap: 15px; }
        button { padding: 15px 30px; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        #btn-online { background: #a855f7; color: white; }
        #btn-bots { background: #4ade80; color: #000; }
        button:hover { transform: scale(1.05); opacity: 0.9; }
        canvas { display: none; background: #050510; }
        #hud { position: fixed; top: 20px; left: 20px; pointer-events: none; display: none; }
        #leaderboard { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; display: none; }
    </style>
</head>
<body>

<div id="menu">
    <div class="logo">SLITHER.IO</div>
    <input type="text" id="nickname" placeholder="Tu nombre..." maxlength="12">
    <div class="btns">
        <button id="btn-bots">SOLO (BOTS)</button>
        <button id="btn-online">JUGAR ONLINE 🌐</button>
    </div>
</div>

<div id="hud">Puntos: <span id="score">0</span></div>
<div id="leaderboard">
    <h4 style="margin-bottom:10px">TOP JUGADORES</h4>
    <div id="lb-list"></div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const WORLD_SIZE = 4000;
let gameActive = false;
let gameMode = '';
let players = {}; // Aquí se guardan TODOS los jugadores (tú y los demás)
let food = [];
let myId = null;

// --- CONEXIÓN SOCKET.IO ---
// Nota: 'http://localhost:3000' es para pruebas locales. 
// Si lo subes a un servidor, cámbialo por tu URL.
const socket = io('http://localhost:3000', { autoConnect: false });

function initCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    canvas.style.display = 'block';
    document.getElementById('hud').style.display = 'block';
    document.getElementById('leaderboard').style.display = 'block';
    document.getElementById('menu').style.display = 'none';
}

// --- LÓGICA ONLINE ---
document.getElementById('btn-online').onclick = () => {
    gameMode = 'online';
    const name = document.getElementById('nickname').value || 'Invitado';
    initCanvas();
    socket.connect();
    
    socket.emit('join-game', { name: name });
    gameActive = true;
    requestAnimationFrame(gameLoop);
};

// Escuchar jugadores del servidor
socket.on('update-players', (serverPlayers) => {
    players = serverPlayers;
    if (!myId) myId = socket.id;
});

socket.on('update-food', (serverFood) => {
    food = serverFood;
});

// --- LÓGICA DE BOTS (IGUAL A LA ANTERIOR PERO CAÓTICA) ---
document.getElementById('btn-bots').onclick = () => {
    gameMode = 'bots';
    initCanvas();
    // (Lógica de bots locales simplificada para el ejemplo)
    gameActive = true;
    requestAnimationFrame(gameLoop);
};

// --- MOUSE Y MOVIMIENTO ---
let mouse = { x: 0, y: 0 };
window.onmousemove = (e) => {
    mouse.x = e.clientX - canvas.width/2;
    mouse.y = e.clientY - canvas.height/2;
    
    if (gameActive && gameMode === 'online') {
        const angle = Math.atan2(mouse.y, mouse.x);
        socket.emit('move', angle);
    }
};

// --- RENDERIZADO ---
function gameLoop() {
    if (!gameActive) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const me = players[myId];
    if (!me) {
        requestAnimationFrame(gameLoop);
        return;
    }

    // Centrar cámara en mí
    const camX = me.x - canvas.width/2;
    const camY = me.y - canvas.height/2;

    ctx.save();
    ctx.translate(-camX, -camY);

    // Dibujar límites
    ctx.strokeStyle = '#4ade80';
    ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);

    // Dibujar comida
    food.forEach(f => {
        ctx.fillStyle = f.color;
        ctx.beginPath();
        ctx.arc(f.x, f.y, 5, 0, Math.PI*2);
        ctx.fill();
    });

    // Dibujar a TODOS los jugadores
    for (let id in players) {
        const p = players[id];
        ctx.fillStyle = (id === myId) ? '#4ade80' : '#a855f7';
        
        // Dibujar cuerpo (simplificado)
        p.body.forEach((seg, index) => {
            ctx.globalAlpha = index === 0 ? 1 : 0.6;
            ctx.beginPath();
            ctx.arc(seg.x, seg.y, 10 + (p.score/100), 0, Math.PI*2);
            ctx.fill();
        });
        
        ctx.globalAlpha = 1;
        ctx.fillStyle = "white";
        ctx.fillText(p.name, p.x - 10, p.y - 25);
    }

    ctx.restore();
    document.getElementById('score').innerText = me.score;
    
    requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
