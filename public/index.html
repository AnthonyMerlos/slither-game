<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Slither.io Clone - Full Stack Sandbox</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, html { width: 100%; height: 100%; overflow: hidden; background: #111; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    
    #canvas { display: block; width: 100vw; height: 100vh; background: #141419; }
    
    /* Interfaz del Menú Principal */
    #menu {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(20, 20, 25, 0.95); padding: 40px; border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; min-width: 360px;
      border: 1px solid #333; z-index: 10; transition: opacity 0.3s ease;
    }
    h1 { color: #fff; margin-bottom: 24px; font-size: 2.5rem; letter-spacing: 2px; text-transform: uppercase;
         background: linear-gradient(45deg, #ff416c, #ff4b2b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    input[type="text"] {
      width: 100%; padding: 14px; border: 2px solid #333; border-radius: 8px;
      background: #1f1f26; color: #fff; font-size: 1rem; margin-bottom: 20px; outline: none; transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #ff416c; }
    
    /* Selector de Aspectos (Skins) */
    .skin-label { color: #aaa; font-size: 0.9rem; margin-bottom: 8px; text-align: left; display: block; }
    #skin-picker { display: flex; gap: 10px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
    .skin-btn {
      width: 45px; height: 45px; border-radius: 50%; cursor: pointer;
      border: 3px solid transparent; transition: transform 0.2s, border-color 0.2s;
    }
    .skin-btn:hover { transform: scale(1.1); }
    .skin-btn.active { border-color: #fff; transform: scale(1.15); }
    
    /* Botones de Modo de Juego */
    .btn {
      width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 8px;
      font-size: 1rem; font-weight: bold; color: #fff; cursor: pointer; transition: background 0.2s, transform 0.1s;
    }
    .btn-online { background: linear-gradient(135deg, #00b4db, #0083b0); }
    .btn-online:hover { background: linear-gradient(135deg, #00c6ff, #0072ff); transform: translateY(-2px); }
    .btn-bots { background: linear-gradient(135deg, #11998e, #38ef7d); }
    .btn-bots:hover { background: linear-gradient(135deg, #12a89d, #43ff8b); transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }
    
    /* HUD de Estado durante la partida */
    #hud { position: absolute; bottom: 20px; left: 20px; color: #fff; font-size: 1.2rem; pointer-events: none; text-shadow: 1px 1px 4px #000; z-index: 5; display: none; }
    #leaderboard { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 8px; color: #fff; pointer-events: none; min-width: 180px; font-family: monospace; z-index: 5; display: none; }
    #leaderboard h3 { border-bottom: 1px solid #555; padding-bottom: 5px; margin-bottom: 8px; color: #ff4365; }
  </style>
</head>
<body>

  <div id="menu">
    <h1>Slither Sandbox</h1>
    <input type="text" id="nickname" placeholder="Tu Nombre de Usuario" value="Pythonic" maxlength="14">
    
    <span class="skin-label">Elige tu aspecto:</span>
    <div id="skin-picker"></div>
    
    <button class="btn btn-online" id="start-online">Modo Multijugador (Online)</button>
    <button class="btn btn-bots" id="start-bots">Modo de Práctica (Bots)</button>
  </div>

  <div id="hud">Puntuación: <span id="score-val">0</span></div>
  <div id="leaderboard">
    <h3>Top 5</h3>
    <div id="leaderboard-list"></div>
  </div>

  <canvas id="canvas"></canvas>

  <!-- Cliente de Socket.io (Se activa en producción o red local) -->
  <script src="/socket.io/socket.io.js" onerror="console.log('Modo online deshabilitado: No se detectó servidor de Node.js dinámico.')"></script>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let W = canvas.width = window.innerWidth;
    let H = canvas.height = window.innerHeight;
    window.addEventListener('resize', () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; });

    // ── Configuración Inicial del Mundo ──
    const MAP_SIZE = 4000; 
    let mode = null; // 'online' o 'bots'
    let selectedSkin = 0;
    let socket = null;

    const SKIN_COLORS = [
      { head: '#ff416c', body: '#ff4b2b' }, // Fuego
      { head: '#00b4db', body: '#0083b0' }, // Océano
      { head: '#11998e', body: '#38ef7d' }, // Ácido
      { head: '#f7971e', body: '#ffd200' }, // Oro
      { head: '#b20a2c', body: '#fffbd5' }  // Vampiro
    ];

    // Datos globales compartidos por iteración
    let localPlayer = { x: MAP_SIZE/2, y: MAP_SIZE/2, angle: 0, targetAngle: 0, score: 0, speed: 200 };
    let onlineSnakes = {};
    let onlineFoods = [];

    // Estructuras de entorno local offline
    let bots = { player: null, list: [], foods: [], cam: { x: 0, y: 0 } };

    // Entrada de ratón
    const mouse = { x: W / 2, y: H / 2 };
    window.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      if (mode === 'bots' && bots.player) {
        bots.player.targetAngle = Math.atan2(mouse.y - H / 2, mouse.x - W / 2);
      }
    });

    // ── Construcción de la Paleta de Aspectos (Skins UI) ──────────────────
    const picker = document.getElementById('skin-picker');
    SKIN_COLORS.forEach((skin, i) => {
      const btn = document.createElement('div');
      btn.className = 'skin-btn' + (i === 0 ? ' active' : '');
      btn.style.background = `linear-gradient(135deg, ${skin.head}, ${skin.body})`;
      btn.addEventListener('click', () => {
        document.querySelectorAll('.skin-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); 
        selectedSkin = i;
      });
      picker.appendChild(btn);
    });

    // ── Clases Auxiliares para Simulación Offline (Modo Bots) ──
    class Snake {
      constructor(id, x, y, name, skinIndex, isBot = true) {
        this.id = id;
        this.name = name;
        this.skin = SKIN_COLORS[skinIndex];
        this.isBot = isBot;
        this.alive = true;
        this.angle = 0;
        this.targetAngle = 0;
        this.speed = 180;
        this.radius = 18;
        this.score = 0;
        
        // Inicializar segmentos iniciales de la estructura lineal
        this.segs = [];
        let length = 15;
        for(let i=0; i<length; i++) {
          this.segs.push({ x: x - i * 10, y: y });
        }
      }

      update(dt) {
        if (!this.alive) return;

        // Comportamiento básico de la Inteligencia Artificial (Modo Bot)
        if (this.isBot) {
          if (Math.random() < 0.03) { 
            this.targetAngle += (Math.random() - 0.5) * 2; 
          }
          // Límite perimetral del mapa para forzar retorno de la IA
          if (this.segs[0].x < 200 || this.segs[0].x > MAP_SIZE - 200 || this.segs[0].y < 200 || this.segs[0].y > MAP_SIZE - 200) {
            this.targetAngle = Math.atan2(MAP_SIZE/2 - this.segs[0].y, MAP_SIZE/2 - this.segs[0].x);
          }
        }

        // Interpolación del ángulo para suavizado direccional
        let diff = this.targetAngle - this.angle;
        while (diff < -Math.PI) diff += Math.PI * 2;
        while (diff > Math.PI) diff -= Math.PI * 2;
        this.angle += diff * 8 * dt;

        // Desplazamiento del nodo principal (Cabeza)
        this.segs[0].x += Math.cos(this.angle) * this.speed * dt;
        this.segs[0].y += Math.sin(this.angle) * this.speed * dt;

        // Arrastre cinemático de los segmentos restantes
        const targetDist = 12; 
        for (let i = 1; i < this.segs.length; i++) {
          let dx = this.segs[i-1].x - this.segs[i].x;
          let dy = this.segs[i-1].y - this.segs[i].y;
          let dist = Math.hypot(dx, dy);
          if (dist > targetDist) {
            let ratio = targetDist / dist;
            this.segs[i].x = this.segs[i-1].x - dx * ratio;
            this.segs[i].y = this.segs[i-1].y - dy * ratio;
          }
        }
      }

      draw(ctx, camX, camY) {
        if (!this.alive) return;
        ctx.save();
        
        // Renderizado del cuerpo (De cola a cabeza para correcto solapamiento)
        for (let i = this.segs.length - 1; i >= 1; i--) {
          ctx.beginPath();
          ctx.arc(this.segs[i].x - camX, this.segs[i].y - camY, this.radius * 0.9, 0, Math.PI*2);
          ctx.fillStyle = this.skin.body;
          ctx.shadowBlur = i === 1 ? 4 : 0;
          ctx.shadowColor = this.skin.body;
          ctx.fill();
        }

        // Renderizado del nodo principal (Cabeza)
        ctx.beginPath();
        ctx.arc(this.segs[0].x - camX, this.segs[0].y - camY, this.radius, 0, Math.PI*2);
        ctx.fillStyle = this.skin.head;
        ctx.fill();

        // Ojos direccionales para legibilidad del ángulo físico
        let eyeX = this.segs[0].x - camX + Math.cos(this.angle + 0.5) * (this.radius * 0.5);
        let eyeY = this.segs[0].y - camY + Math.sin(this.angle + 0.5) * (this.radius * 0.5);
        ctx.beginPath(); ctx.arc(eyeX, eyeY, 4, 0, Math.PI*2); ctx.fillStyle = '#fff'; ctx.fill();
        ctx.beginPath(); ctx.arc(eyeX, eyeY, 1.5, 0, Math.PI*2); ctx.fillStyle = '#000'; ctx.fill();

        eyeX = this.segs[0].x - camX + Math.cos(this.angle - 0.5) * (this.radius * 0.5);
        eyeY = this.segs[0].y - camY + Math.sin(this.angle - 0.5) * (this.radius * 0.5);
        ctx.beginPath(); ctx.arc(eyeX, eyeY, 4, 0, Math.PI*2); ctx.fillStyle = '#fff'; ctx.fill();
        ctx.beginPath(); ctx.arc(eyeX, eyeY, 1.5, 0, Math.PI*2); ctx.fillStyle = '#000'; ctx.fill();

        // Indicador de Texto del Nombre
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.font = '12px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(this.name, this.segs[0].x - camX, this.segs[0].y - camY - (this.radius + 8));
        ctx.restore();
      }

      grow(amount) {
        this.score += amount;
        for (let i = 0; i < amount; i++) {
          let last = this.segs[this.segs.length - 1];
          this.segs.push({ x: last.x, y: last.y });
        }
      }
    }

    // ── Lógica de Simulación Local (Offline Loop) ──
    function initBotsMode() {
      mode = 'bots';
      const nick = document.getElementById('nickname').value || 'User';
      
      bots.player = new Snake('player', MAP_SIZE/2, MAP_SIZE/2, nick, selectedSkin, false);
      bots.list = [bots.player];

      // Inicialización de Inteligencias Artificiales adicionales
      const botNames = ['Cobrita', 'Nokia3310', 'Viper', 'Anaconda', 'Asphalt', 'Glutton', 'Basilisk'];
      for (let i = 0; i < botNames.length; i++) {
        bots.list.push(new Snake('bot'+i, Math.random() * (MAP_SIZE - 400) + 200, Math.random() * (MAP_SIZE - 400) + 200, botNames[i], Math.floor(Math.random() * SKIN_COLORS.length), true));
      }

      // Generación estática de alimento local
      for (let i = 0; i < 300; i++) {
        bots.foods.push({
          x: Math.random() * MAP_SIZE,
          y: Math.random() * MAP_SIZE,
          r: Math.random() * 4 + 3,
          color: `hsl(${Math.random() * 360}, 100%, 60%)`
        });
      }

      // Sincronización de coordenadas iniciales de la cámara
      bots.cam.x = bots.player.segs[0].x - W / 2;
      bots.cam.y = bots.player.segs[0].y - H / 2;
    }

    function updateBotsLoop(dt) {
      // Ciclo de actualización de entidades físicas y colisiones
      bots.list.forEach(snake => {
        if (!snake.alive) return;
        snake.update(dt);

        // Intersección de colisiones con alimentos
        bots.foods.forEach((food, fIdx) => {
          let dist = Math.hypot(snake.segs[0].x - food.x, snake.segs[0].y - food.y);
          if (dist < snake.radius + food.r) {
            snake.grow(1);
            // Reposicionamiento del alimento consumido dentro del mapa perimetral
            food.x = Math.random() * MAP_SIZE;
            food.y = Math.random() * MAP_SIZE;
          }
        });
      });

      // Verificación cruzada de colisiones estructurales entre serpientes (Cabeza vs Cuerpo)
      bots.list.forEach(snake => {
        if (!snake.alive) return;
        bots.list.forEach(target => {
          if (!target.alive || snake.id === target.id) return;

          // Se evalúa cada segmento del cuerpo objetivo
          for (let i = 0; i < target.segs.length; i++) {
            let dist = Math.hypot(snake.segs[0].x - target.segs[i].x, snake.segs[0].y - target.segs[i].y);
            if (dist < snake.radius + target.radius * 0.8) {
              snake.alive = false;
              if (snake.id === 'player') {
                alert('Fin de la partida offline. Puntuación obtenida: ' + snake.score);
                location.reload();
              } else {
                // Re-spawn reactivo para el bot destruido
                setTimeout(() => {
                  let idx = bots.list.findIndex(b => b.id === snake.id);
                  if (idx !== -1) bots.list[idx] = new Snake(snake.id, Math.random() * MAP_SIZE, Math.random() * MAP_SIZE, snake.name, Math.floor(Math.random() * SKIN_COLORS.length), true);
                }, 3000);
              }
            }
          }
        });
      });

      // Actualizar el valor del HUD si el jugador local sigue con vida
      if (bots.player && bots.player.alive) {
        document.getElementById('score-val').innerText = bots.player.score;
      }

      // Ordenar y actualizar tabla de clasificación estática
      let sorted = [...bots.list].sort((a,b) => b.score - a.score).slice(0, 5);
      let listHTML = '';
      sorted.forEach((s, idx) => {
        listHTML += `<div>#${idx+1} ${s.name}: ${s.score}</div>`;
      });
      document.getElementById('leaderboard-list').innerHTML = listHTML;
    }

    // ── Conexión de Red Multijugador Real (Modo Online) ──
    function initOnlineMode() {
      if (typeof io === 'undefined') {
        alert('Servidor de red local no disponible. Cargando el modo de práctica con bots automáticos por seguridad.');
        initBotsMode();
        return;
      }
      
      mode = 'online';
      socket = io();

      const nick = document.getElementById('nickname').value || 'ProPlayer';
      socket.emit('join', { name: nick, skin: selectedSkin });

      // Escuchadores de eventos de red distribuidos del backend
      socket.on('snapshot', (data) => {
        onlineSnakes = data.snakes;
        onlineFoods = data.foods;
      });

      // Evento reactivo ante destrucción estructural
      socket.on('kill', () => {
        alert('Has colisionado contra otra serpiente de la red. Reintentar.');
        location.reload();
      });
    }

    // ── Controladores de Inicialización de la UI ──
    document.getElementById('start-bots').addEventListener('click', () => {
      document.getElementById('menu').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        document.getElementById('leaderboard').style.display = 'block';
        initBotsMode();
      }, 300);
    });

    document.getElementById('start-online').addEventListener('click', () => {
      document.getElementById('menu').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        document.getElementById('leaderboard').style.display = 'block';
        initOnlineMode();
      }, 300);
    });

    // ── Motor Gráfico y Bucle de Animación Principal (Delta Time Integrado) ──
    let lastTime = performance.now();

    function frame(currentTime) {
      requestAnimationFrame(frame);
      
      // Cálculo preciso del Delta Time matemático (segundos transcurridos)
      let dt = (currentTime - lastTime) / 1000;
      if (dt > 0.1) dt = 0.1; // Protección contra picos por pérdida de foco
      lastTime = currentTime;

      // Limpieza recursiva del Canvas
      ctx.clearRect(0, 0, W, H);

      let camX = 0, camY = 0;

      if (mode === 'bots') {
        // Ejecución física del sandbox offline
        updateBotsLoop(dt);
        
        // Suavizado dinámico de la cámara local
        if (bots.player && bots.player.alive) {
          bots.cam.x += (bots.player.segs[0].x - W / 2 - bots.cam.x) * 0.15 * dt * 60;
          bots.cam.y += (bots.player.segs[0].y - H / 2 - bots.cam.y) * 0.15 * dt * 60;
        }
        camX = bots.cam.x;
        camY = bots.cam.y;

      } else if (mode === 'online') {
        // Lógica de transmisión cíclica de entrada hacia el servidor Node.js
        let localAngle = Math.atan2(mouse.y - H / 2, mouse.x - W / 2);
        socket.emit('input', localAngle);

        // Localizar id propio de la red de datos para enfoque de cámara
        let mySnake = onlineSnakes[socket.id];
        if (mySnake && mySnake.segs && mySnake.segs[0]) {
          camX = mySnake.segs[0].x - W / 2;
          camY = mySnake.segs[0].y - H / 2;
          document.getElementById('score-val').innerText = mySnake.score;
        }

        // Actualizar tabla de clasificación en red local
        let sorted = Object.values(onlineSnakes).sort((a,b) => b.score - a.score).slice(0, 5);
        let listHTML = '';
        sorted.forEach((s, idx) => {
          listHTML += `<div>#${idx+1} ${s.name}: ${s.score}</div>`;
        });
        document.getElementById('leaderboard-list').innerHTML = listHTML;
      }

      // Renderizado del Fondo de Retícula Estructural (Grid)
      ctx.save();
      ctx.strokeStyle = '#23232f';
      ctx.lineWidth = 1;
      let gridSize = 50;
      let startX = Math.floor(camX / gridSize) * gridSize;
      let startY = Math.floor(camY / gridSize) * gridSize;

      for (let x = startX; x < startX + W + gridSize; x += gridSize) {
        ctx.beginPath(); ctx.moveTo(x - camX, 0); ctx.lineTo(x - camX, H); ctx.stroke();
      }
      for (let y = startY; y < startY + H + gridSize; y += gridSize) {
        ctx.beginPath(); ctx.moveTo(0, y - camY); ctx.lineTo(W, y - camY); ctx.stroke();
      }
      
      // Dibujado del Límite del Mapa (Borde de advertencia)
      ctx.strokeStyle = '#ff416c';
      ctx.lineWidth = 5;
      ctx.strokeRect(0 - camX, 0 - camY, MAP_SIZE, MAP_SIZE);
      ctx.restore();

      // Renderizado de Alimentos en pantalla
      if (mode === 'bots') {
        bots.foods.forEach(food => {
          // Culling visual básico para omitir renderizados fuera del área visible de la pantalla
          if (food.x - camX > -20 && food.x - camX < W + 20 && food.y - camY > -20 && food.y - camY < H + 20) {
            ctx.beginPath();
            ctx.arc(food.x - camX, food.y - camY, food.r, 0, Math.PI*2);
            ctx.fillStyle = food.color;
            ctx.fill();
          }
        });
        
        // Renderizado del set completo de serpientes locales (Bots + Jugador)
        bots.list.forEach(snake => snake.draw(ctx, camX, camY));

      } else if (mode === 'online') {
        // Dibujado de alimentos distribuidos desde la red
        onlineFoods.forEach(food => {
          ctx.beginPath();
          ctx.arc(food.x - camX, food.y - camY, food.r || 4, 0, Math.PI*2);
          ctx.fillStyle = food.color || '#ff0';
          ctx.fill();
        });

        // Dibujado adaptativo de objetos JSON remotos transformados a pantalla
        Object.keys(onlineSnakes).forEach(id => {
          let s = onlineSnakes[id];
          if (!s.segs || s.segs.length === 0) return;

          let skin = SKIN_COLORS[s.skin] || SKIN_COLORS[0];
          let radius = s.radius || 18;

          // Dibujar cuerpo remoto
          for (let i = s.segs.length - 1; i >= 1; i--) {
            ctx.beginPath();
            ctx.arc(s.segs[i].x - camX, s.segs[i].y - camY, radius * 0.9, 0, Math.PI*2);
            ctx.fillStyle = skin.body;
            ctx.fill();
          }
          // Dibujar cabeza remota
          ctx.beginPath();
          ctx.arc(s.segs[0].x - camX, s.segs[0].y - camY, radius, 0, Math.PI*2);
          ctx.fillStyle = skin.head;
          ctx.fill();

          // Nombre de red del cliente remoto
          ctx.fillStyle = '#fff';
          ctx.font = '12px monospace';
          ctx.textAlign = 'center';
          ctx.fillText(s.name, s.segs[0].x - camX, s.segs[0].y - camY - (radius + 8));
        });
      }
    }

    // Inicializar el ciclo gráfico primario del entorno
    requestAnimationFrame(frame);
  </script>
</body>
</html>
